<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đồ ăn nhanh - FoodHub</title>
    <link rel="stylesheet" href="fastfood.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="../menu/menu.html">FoodHub</a>
      <nav>
        <a href="../menu/menu.html">Trang chủ</a>
        <a class="active" href="../fastfood/fastfood.html">Đồ ăn nhanh</a>
        <a href="../family/family.html">Đồ ăn gia đình</a>
      </nav>
      <a id="authLink" class="auth-link" href="../login/login.html">Đăng nhập</a>
    </header>

    <main class="page">
      <section class="intro">
        <p>Đặt nhanh</p>
        <h1>Đồ ăn nhanh</h1>
        <span>Burger, pizza, gà rán và các combo tiện lợi.</span>
      </section>

      <section class="layout">
        <div class="food-grid" id="foodGrid"></div>

        <aside class="cart">
          <h2>Giỏ hàng</h2>
          <div id="cartList" class="cart-list"></div>
          <div class="total">
            <span>Tổng tiền</span>
            <strong id="total">0đ</strong>
          </div>
          <button id="orderBtn" type="button">Đặt món</button>

          <div id="orderSuccess" class="order-success">
            <span>Đơn hàng đã nhận</span>
            <strong id="orderCode">FH0000</strong>
            <p id="orderText">Cửa hàng sẽ chuẩn bị và giao trong 25 - 30 phút.</p>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const foods = [
        {
          id: 1,
          name: "Burger bò",
          price: 55000,
          desc: "Bò nướng, phô mai, rau tươi.",
          image:
            "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=700&q=80",
        },
        {
          id: 2,
          name: "Pizza hải sản",
          price: 125000,
          desc: "Tôm, mực, phô mai và sốt cà chua.",
          image:
            "https://images.unsplash.com/photo-1594007654729-407eedc4be65?auto=format&fit=crop&w=700&q=80",
        },
        {
          id: 3,
          name: "Gà rán giòn",
          price: 69000,
          desc: "Gà nóng giòn, vị cay vừa.",
          image:
            "https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=700&q=80",
        },
        {
          id: 4,
          name: "Combo burger",
          price: 79000,
          desc: "Burger, khoai tây và nước ngọt.",
          image:
            "https://images.unsplash.com/photo-1551782450-a2132b4ba21d?auto=format&fit=crop&w=700&q=80",
        },
      ];

      const foodGrid = document.getElementById("foodGrid");
      const cartList = document.getElementById("cartList");
      const total = document.getElementById("total");
      const orderBtn = document.getElementById("orderBtn");
      const orderSuccess = document.getElementById("orderSuccess");
      const orderCode = document.getElementById("orderCode");
      const orderText = document.getElementById("orderText");
      const authLink = document.getElementById("authLink");
      let cart = [];

      function formatMoney(value) {
        return value.toLocaleString("vi-VN") + "đ";
      }

      function isLoggedIn() {
        return localStorage.getItem("isLogin") === "true";
      }

      function renderAuthLink() {
        if (isLoggedIn()) {
          authLink.textContent = "Đăng xuất";
          authLink.href = "#";
          authLink.classList.add("logged-in");
          return;
        }

        authLink.textContent = "Đăng nhập";
        authLink.href = "../login/login.html";
        authLink.classList.remove("logged-in");
      }

      function renderFoods() {
        foodGrid.innerHTML = foods
          .map(
            (food) => `
              <article class="card">
                <img src="${food.image}" alt="${food.name}" />
                <div>
                  <h3>${food.name}</h3>
                  <p>${food.desc}</p>
                  <strong>${formatMoney(food.price)}</strong>
                  <button data-id="${food.id}" type="button">Thêm món</button>
                </div>
              </article>
            `
          )
          .join("");
      }

      function addToCart(id) {
        const food = foods.find((item) => item.id === id);
        const item = cart.find((cartItem) => cartItem.id === id);

        if (item) {
          item.quantity += 1;
        } else {
          cart.push({ ...food, quantity: 1 });
        }

        orderSuccess.classList.remove("show");
        renderCart();
      }

      function getCartTotal() {
        return cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      }

      function renderCart() {
        if (cart.length === 0) {
          cartList.innerHTML = '<p class="empty">Chưa có món nào.</p>';
          total.textContent = "0đ";
          return;
        }

        cartList.innerHTML = cart
          .map(
            (item) => `
              <div class="cart-item">
                <span>${item.name} x ${item.quantity}</span>
                <strong>${formatMoney(item.price * item.quantity)}</strong>
              </div>
            `
          )
          .join("");

        total.textContent = formatMoney(getCartTotal());
      }

      foodGrid.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (button) addToCart(Number(button.dataset.id));
      });

      orderBtn.addEventListener("click", () => {
        if (!isLoggedIn()) {
          alert("Vui lòng đăng nhập trước khi đặt món.");
          window.location.href = "../login/login.html";
          return;
        }

        if (cart.length === 0) {
          alert("Vui lòng chọn món trước khi đặt hàng.");
          return;
        }

        const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        const finalTotal = getCartTotal();

        orderCode.textContent = `FH${Date.now().toString().slice(-5)}`;
        orderText.textContent = `Đã đặt ${itemCount} món, tổng ${formatMoney(
          finalTotal
        )}. Cửa hàng sẽ giao trong 25 - 30 phút.`;
        orderSuccess.classList.add("show");

        cart = [];
        renderCart();
      });

      authLink.addEventListener("click", (event) => {
        if (!isLoggedIn()) return;

        event.preventDefault();
        localStorage.setItem("isLogin", "false");
        renderAuthLink();
        orderSuccess.classList.remove("show");
      });

      renderAuthLink();
      renderFoods();
      renderCart();
    </script>
  </body>
</html>
