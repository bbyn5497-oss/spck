<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - FoodHub</title>
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <main class="auth-card">
      <a class="brand" href="../menu/menu.html">FoodHub</a>
      <h1>Đăng ký</h1>

      <label>
        Tên đăng nhập
        <input type="text" id="username" placeholder="Ví dụ: trung123" />
      </label>

      <label>
        Email
        <input type="email" id="email" placeholder="you@example.com" />
      </label>

      <label>
        Mật khẩu
        <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" />
      </label>

      <label>
        Nhập lại mật khẩu
        <input
          type="password"
          id="confirmPassword"
          placeholder="Nhập lại mật khẩu"
        />
      </label>

      <button id="registerBtn" type="button">Tạo tài khoản</button>
      <p class="switch-page">
        Đã có tài khoản?
        <a href="../login/login.html">Đăng nhập</a>
      </p>
    </main>

    <script>
      const registerBtn = document.getElementById("registerBtn");

      function register() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (!username || !email || !password || !confirmPassword) {
          alert("Vui lòng nhập đầy đủ thông tin.");
          return;
        }

        if (!email.includes("@")) {
          alert("Email chưa đúng định dạng.");
          return;
        }

        if (password.length < 6) {
          alert("Mật khẩu cần có tối thiểu 6 ký tự.");
          return;
        }

        if (password !== confirmPassword) {
          alert("Mật khẩu nhập lại không khớp.");
          return;
        }

        localStorage.setItem(
          "account",
          JSON.stringify({ username, email, password }),
        );
        localStorage.setItem("isLogin", "false");

        alert("Đăng ký thành công!");
        window.location.href = "../login/login.html";
      }

      registerBtn.addEventListener("click", register);
    </script>
  </body>
</html>
