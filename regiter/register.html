<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Register Food Shop</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="box">
  <h2>🍟 Đăng ký</h2>

  <input type="text" id="username" placeholder="Tên người dùng">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mật khẩu">
  <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">

  <button onclick="register()">Tạo tài khoản</button>

  <p>Bạn đã có tài khoản?</p>
  <a href="../login/login.html">👉 Đăng nhập</a>
</div>

<script>
function register() {

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (username === "" || email === "" || password === "" || confirmPassword === "") {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    if (password !== confirmPassword) {
        alert("Mật khẩu nhập lại không khớp!");
        return;
    }

    const account = {
        username: username,
        email: email,
        password: password
    };

    // Lưu tài khoản
    localStorage.setItem("account", JSON.stringify(account));

    // Chưa đăng nhập
    localStorage.setItem("isLogin", "false");

    alert("Đăng ký thành công!");

    // Chuyển sang trang đăng nhập
    window.location.href = "../login/login.html";
}
</script>

</body>
</html>
