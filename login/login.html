<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - FoodHub</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="auth-card">
      <a class="brand" href="../menu/menu.html">FoodHub</a>
      <h1>Đăng nhập</h1>
      <p>Vào tài khoản để tiếp tục đặt món.</p>

      <label>
        Tên đăng nhập
        <input type="text" id="username" placeholder="Nhập tên đăng nhập" />
      </label>

      <label>
        Mật khẩu
        <input type="password" id="password" placeholder="Nhập mật khẩu" />
      </label>

      <button id="loginBtn" type="button">Đăng nhập</button>
      <p class="switch-page">
        Chưa có tài khoản?
        <a href="../regiter/register.html">Đăng ký ngay</a>
      </p>
    </main>

    <script>
      const loginBtn = document.getElementById("loginBtn");

      function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const account = JSON.parse(localStorage.getItem("account"));

        if (!username || !password) {
          alert("Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.");
          return;
        }

        if (!account) {
          alert("Chưa có tài khoản. Vui lòng đăng ký trước.");
          return;
        }

        if (username === account.username && password === account.password) {
          localStorage.setItem("isLogin", "true");
          alert("Đăng nhập thành công!");
          window.location.href = "../menu/menu.html";
          return;
        }

        alert("Sai tên đăng nhập hoặc mật khẩu.");
      }

      loginBtn.addEventListener("click", login);
    </script>
  </body>
</html>
